name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p dist
          git archive --format=tar.gz --prefix="forge-glow-${TAG#v}/" "$TAG" > "dist/forge-glow-${TAG#v}.tar.gz"
          (cd dist && shasum -a 256 "forge-glow-${TAG#v}.tar.gz" | tee "forge-glow-${TAG#v}.tar.gz.sha256")

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true

  pypi:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref, '-rc') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build stats sdist + wheel
        working-directory: stats
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Publish to PyPI (opt-in)
        working-directory: stats
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --non-interactive dist/*
